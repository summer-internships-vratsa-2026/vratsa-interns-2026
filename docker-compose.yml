services:
  postgres:
    image: postgres:16-alpine
    container_name: core-lms-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: core_lms
      POSTGRES_PASSWORD: core_lms
      POSTGRES_DB: core_lms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core_lms -d core_lms"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
